name: foundation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  gate-s1_1:
    runs-on: ubuntu-latest
    services: &foundation_services
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: paperscraper_next
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d paperscraper_next"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env: &foundation_env
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/paperscraper_next?schema=public
      REDIS_URL: redis://localhost:6379
      API_PORT: 4000
      TRPC_PATH: /trpc
      HEALTH_PROBE_TIMEOUT_MS: 1000
      WEB_PORT: 3333
      VITE_API_BASE_URL: http://localhost:4000
      JOB_QUEUE_NAME: psn.foundation
      JOB_WORKER_CONCURRENCY: 2
      JOB_READINESS_MAX_ATTEMPTS: 3
      JOB_READINESS_BASE_DELAY_MS: 200
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install dependencies
        run: npm ci
      - name: Lint agents
        run: npm run lint:agents
      - name: Lint docs
        run: npm run lint:docs
      - name: Lint phase S1.1
        run: npm run lint:phase -- --phase=S1.1
      - name: Gate phase S1.1
        run: npm run gate:phase -- --phase=S1.1

  runtime-smoke-s1_1:
    runs-on: ubuntu-latest
    needs: gate-s1_1
    services: *foundation_services
    env: *foundation_env
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install dependencies
        run: npm ci
      - name: Runtime smoke S1.1
        run: node tools/phase-gate/verify-s1_1.mjs --mode=runtime

  gate-s1_2:
    runs-on: ubuntu-latest
    services: *foundation_services
    env: &s1_2_env
      <<: *foundation_env
      GRAPH_QUEUE_NAME: psn.object.created
      OPENALEX_BASE_URL: https://api.openalex.org
      OPENALEX_API_KEY: ""
      OPENALEX_TIMEOUT_MS: 6000
      OPENALEX_MAX_RETRIES: 3
      OPENALEX_RETRY_BASE_DELAY_MS: 250
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install dependencies
        run: npm ci
      - name: Lint agents
        run: npm run lint:agents
      - name: Lint docs
        run: npm run lint:docs
      - name: Lint phase S1.2
        run: npm run lint:phase -- --phase=S1.2
      - name: Gate phase S1.2
        run: npm run gate:phase -- --phase=S1.2

  runtime-smoke-s1_2:
    runs-on: ubuntu-latest
    needs: gate-s1_2
    services: *foundation_services
    env: *s1_2_env
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.9
      - name: Install dependencies
        run: npm ci
      - name: Runtime smoke S1.2
        run: node tools/phase-gate/verify-s1_2.mjs --mode=runtime
